<!DOCTYPE html>
<html lang="id">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Akses Tidak Tersedia</title>
<style>
  @import url('https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600&family=Space+Grotesk:wght@500;700&display=swap');

  *, *::before, *::after { margin: 0; padding: 0; box-sizing: border-box; }

  :root {
    --bg:        #080810;
    --surface:   #0f0f1a;
    --border:    rgba(255,255,255,0.07);
    --accent:    #e05c2a;
    --accent2:   #9b4de0;
    --text:      #e8e8f0;
    --muted:     #6b6b80;
    --glow-a:    rgba(224, 92, 42, 0.35);
    --glow-b:    rgba(155, 77, 224, 0.25);
  }

  html, body { height: 100%; }

  body {
    font-family: 'Inter', system-ui, sans-serif;
    background: var(--bg);
    color: var(--text);
    display: flex;
    align-items: center;
    justify-content: center;
    min-height: 100vh;
    overflow: hidden;
  }

  /* ── Background canvas ── */
  canvas {
    position: fixed;
    inset: 0;
    width: 100%;
    height: 100%;
    z-index: 0;
    pointer-events: none;
  }

  /* ── Ambient orbs ── */
  .orb {
    position: fixed;
    border-radius: 50%;
    filter: blur(90px);
    pointer-events: none;
    z-index: 0;
    animation: drift 12s ease-in-out infinite alternate;
  }
  .orb-1 {
    width: 420px; height: 420px;
    top: -120px; left: -100px;
    background: var(--glow-a);
    animation-duration: 14s;
  }
  .orb-2 {
    width: 380px; height: 380px;
    bottom: -100px; right: -80px;
    background: var(--glow-b);
    animation-duration: 18s;
    animation-delay: -6s;
  }
  @keyframes drift {
    from { transform: translate(0, 0) scale(1); }
    to   { transform: translate(30px, 20px) scale(1.08); }
  }

  /* ── Card ── */
  .card {
    position: relative;
    z-index: 1;
    width: min(440px, 92vw);
    background: var(--surface);
    border: 1px solid var(--border);
    border-radius: 24px;
    padding: 3rem 2.5rem 2.5rem;
    text-align: center;
    /* glass shimmer top edge */
    background-image:
      linear-gradient(
        160deg,
        rgba(255,255,255,0.04) 0%,
        transparent 50%
      );
    box-shadow:
      0 0 0 1px rgba(255,255,255,0.04),
      0 32px 80px rgba(0,0,0,0.6),
      0 0 60px var(--glow-a);
    animation: fadeUp 0.7s cubic-bezier(.22,.68,0,1.2) both;
  }
  @keyframes fadeUp {
    from { opacity:0; transform: translateY(28px) scale(0.97); }
    to   { opacity:1; transform: translateY(0)    scale(1);    }
  }

  /* top accent bar */
  .card::before {
    content: '';
    position: absolute;
    top: 0; left: 10%; right: 10%;
    height: 1px;
    background: linear-gradient(90deg, transparent, var(--accent), var(--accent2), transparent);
    border-radius: 1px;
  }

  /* ── Icon ── */
  .icon-wrap {
    width: 72px; height: 72px;
    margin: 0 auto 1.75rem;
    border-radius: 50%;
    display: flex;
    align-items: center;
    justify-content: center;
    background: radial-gradient(circle at 40% 35%, rgba(224,92,42,0.18), rgba(155,77,224,0.10));
    border: 1px solid rgba(224,92,42,0.35);
    box-shadow: 0 0 28px var(--glow-a), inset 0 1px 0 rgba(255,255,255,0.06);
    position: relative;
    animation: pulse-ring 3s ease-in-out infinite;
  }
  @keyframes pulse-ring {
    0%, 100% { box-shadow: 0 0 20px var(--glow-a), inset 0 1px 0 rgba(255,255,255,0.06); }
    50%       { box-shadow: 0 0 40px var(--glow-a), 0 0 70px rgba(224,92,42,0.15), inset 0 1px 0 rgba(255,255,255,0.06); }
  }

  .icon-wrap svg {
    width: 30px; height: 30px;
    stroke: var(--accent);
    stroke-width: 1.8;
    fill: none;
    filter: drop-shadow(0 0 6px var(--accent));
  }

  /* ── Status pill ── */
  .status-pill {
    display: inline-flex;
    align-items: center;
    gap: 6px;
    background: rgba(224,92,42,0.1);
    border: 1px solid rgba(224,92,42,0.25);
    border-radius: 100px;
    padding: 4px 14px;
    font-size: 0.72rem;
    font-weight: 500;
    color: var(--accent);
    letter-spacing: 0.08em;
    text-transform: uppercase;
    margin-bottom: 1.25rem;
  }
  .status-dot {
    width: 6px; height: 6px;
    border-radius: 50%;
    background: var(--accent);
    animation: blink 1.4s ease-in-out infinite;
  }
  @keyframes blink {
    0%,100% { opacity: 1; }
    50%      { opacity: 0.25; }
  }

  /* ── Headings ── */
  h1 {
    font-family: 'Space Grotesk', sans-serif;
    font-size: 1.65rem;
    font-weight: 700;
    letter-spacing: -0.02em;
    line-height: 1.2;
    margin-bottom: 0.85rem;
    background: linear-gradient(135deg, #fff 40%, rgba(255,255,255,0.55));
    -webkit-background-clip: text;
    -webkit-text-fill-color: transparent;
    background-clip: text;
  }

  p {
    font-size: 0.95rem;
    color: var(--muted);
    line-height: 1.65;
    margin-bottom: 2rem;
    max-width: 320px;
    margin-inline: auto;
    margin-bottom: 2rem;
  }

  /* ── Button ── */
  .btn {
    display: inline-flex;
    align-items: center;
    gap: 8px;
    padding: 0.85rem 2rem;
    font-size: 0.9rem;
    font-weight: 500;
    font-family: inherit;
    border: none;
    border-radius: 12px;
    background: linear-gradient(135deg, var(--accent), #c94e22);
    color: #fff;
    cursor: pointer;
    letter-spacing: 0.01em;
    position: relative;
    overflow: hidden;
    transition: transform 0.2s, box-shadow 0.2s;
    box-shadow: 0 4px 20px rgba(224,92,42,0.4);
    width: 100%;
    justify-content: center;
  }
  .btn::after {
    content: '';
    position: absolute;
    inset: 0;
    background: linear-gradient(180deg, rgba(255,255,255,0.12) 0%, transparent 60%);
    pointer-events: none;
  }
  .btn:hover {
    transform: translateY(-2px);
    box-shadow: 0 8px 32px rgba(224,92,42,0.55);
  }
  .btn:active { transform: translateY(0); }

  .btn svg {
    width: 16px; height: 16px;
    stroke: currentColor;
    fill: none;
    stroke-width: 2;
    flex-shrink: 0;
  }

  /* ── Divider ── */
  .divider {
    height: 1px;
    background: var(--border);
    margin: 1.75rem 0;
  }

  /* ── Info row ── */
  .info-row {
    display: flex;
    align-items: flex-start;
    gap: 10px;
    background: rgba(255,255,255,0.03);
    border: 1px solid var(--border);
    border-radius: 12px;
    padding: 0.85rem 1rem;
    text-align: left;
  }
  .info-row svg {
    width: 16px; height: 16px;
    stroke: var(--muted);
    fill: none;
    stroke-width: 2;
    flex-shrink: 0;
    margin-top: 1px;
  }
  .info-row span {
    font-size: 0.82rem;
    color: var(--muted);
    line-height: 1.55;
  }
  .info-row span strong {
    color: rgba(255,255,255,0.5);
    font-weight: 500;
  }

  /* ── Footer note ── */
  .footer-note {
    margin-top: 1.5rem;
    font-size: 0.75rem;
    color: rgba(255,255,255,0.15);
    letter-spacing: 0.02em;
  }

  @media (prefers-reduced-motion: reduce) {
    .orb, .card, .icon-wrap { animation: none; }
    .status-dot { animation: none; opacity: 1; }
  }
</style>
</head>
<body>

<!-- Particle canvas -->
<canvas id="bg"></canvas>

<!-- Ambient orbs -->
<div class="orb orb-1"></div>
<div class="orb orb-2"></div>

<!-- Card -->
<div class="card">

  <div class="icon-wrap">
    <!-- lock icon -->
    <svg viewBox="0 0 24 24" xmlns="http://www.w3.org/2000/svg">
      <rect x="3" y="11" width="18" height="11" rx="2" ry="2"/>
      <path d="M7 11V7a5 5 0 0 1 10 0v4"/>
    </svg>
  </div>

  <div class="status-pill">
    <span class="status-dot"></span>
    Akses Dinonaktifkan
  </div>

  <h1>Situs Sementara<br>Tidak Dapat Diakses</h1>
  <p>Halaman ini sedang dalam pemeliharaan atau aksesnya sedang dibatasi. Coba kembali beberapa saat lagi.</p>

  <button class="btn" onclick="handleRetry(this)">
    <svg viewBox="0 0 24 24"><polyline points="23 4 23 10 17 10"/><path d="M20.49 15a9 9 0 1 1-2.12-9.36L23 10"/></svg>
    Coba Lagi
  </button>

  <div class="divider"></div>

  <div class="info-row">
    <svg viewBox="0 0 24 24"><circle cx="12" cy="12" r="10"/><line x1="12" y1="8" x2="12" y2="12"/><line x1="12" y1="16" x2="12.01" y2="16"/></svg>
    <span>Jika masalah berlanjut, silakan <strong>hubungi pemilik situs</strong> dengan menyertakan waktu dan tanggal akses.</span>
  </div>

  <p class="footer-note">ERR_ACCESS_RESTRICTED · <span id="ts"></span></p>
</div>

<script>
/* ── Timestamp ── */
const ts = document.getElementById('ts');
ts.textContent = new Date().toLocaleString('id-ID', { dateStyle:'medium', timeStyle:'short' });

/* ── Retry button ── */
function handleRetry(btn) {
  btn.disabled = true;
  btn.innerHTML = `<svg viewBox="0 0 24 24" style="animation:spin .7s linear infinite"><polyline points="23 4 23 10 17 10"/><path d="M20.49 15a9 9 0 1 1-2.12-9.36L23 10"/></svg> Memuat…`;
  setTimeout(() => window.location.reload(), 600);
}

/* ── Particle system ── */
const canvas = document.getElementById('bg');
const ctx    = canvas.getContext('2d');
let W, H, particles = [];

function resize() {
  W = canvas.width  = window.innerWidth;
  H = canvas.height = window.innerHeight;
  for (let p of particles) {
    p.x = Math.min(p.x, W);
    p.y = Math.min(p.y, H);
  }
}

function initParticles() {
  particles = [];
  const count = Math.min(100, Math.floor((W * H) / 14000));
  for (let i = 0; i < count; i++) {
    particles.push({
      x:     Math.random() * W,
      y:     Math.random() * H,
      r:     Math.random() * 1.4 + 0.3,
      dx:    (Math.random() - 0.5) * 0.25,
      dy:    (Math.random() - 0.5) * 0.25,
      alpha: Math.random() * 0.18 + 0.03,
      hue:   Math.random() < 0.15 ? 20 : 0   /* occasional warm tint */
    });
  }
}

function draw() {
  ctx.clearRect(0, 0, W, H);
  for (let p of particles) {
    ctx.beginPath();
    ctx.arc(p.x, p.y, p.r, 0, Math.PI * 2);
    ctx.fillStyle = p.hue
      ? `rgba(255,${140 + p.hue},80,${p.alpha})`
      : `rgba(255,255,255,${p.alpha})`;
    ctx.fill();
    p.x += p.dx;
    p.y += p.dy;
    if (p.x < 0 || p.x > W) p.dx *= -1;
    if (p.y < 0 || p.y > H) p.dy *= -1;
  }
  requestAnimationFrame(draw);
}

/* ── Spin keyframe for reload icon ── */
const style = document.createElement('style');
style.textContent = '@keyframes spin { to { transform: rotate(360deg); } }';
document.head.appendChild(style);

resize();
initParticles();
draw();
window.addEventListener('resize', () => { resize(); initParticles(); });
</script>
</body>
</html>
