<!DOCTYPE html>
<html lang="id">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Korean MMO Chat Assistant</title>

<style>
*{
  margin:0;
  padding:0;
  box-sizing:border-box;
}

body{
  font-family:Arial,sans-serif;
  background:
    radial-gradient(circle at top,#172033 0%,#0f1115 45%,#080a0f 100%);
  color:white;
  min-height:100vh;
  display:flex;
  justify-content:center;
  align-items:center;
  padding:20px;
}

.container{
  width:100%;
  max-width:760px;
  background:#181c23;
  border:1px solid #2c3440;
  border-radius:24px;
  padding:25px;
  box-shadow:
    0 0 50px rgba(0,0,0,.35),
    0 0 90px rgba(76,141,255,.12);
}

.hero{
  text-align:center;
  margin-bottom:26px;
}

.beta{
  display:inline-block;
  background:linear-gradient(90deg,#4c8dff,#7a5cff);
  color:white;
  padding:6px 14px;
  border-radius:999px;
  font-size:11px;
  font-weight:bold;
  letter-spacing:1px;
  margin-bottom:16px;
  box-shadow:0 0 20px rgba(76,141,255,.35);
}

.logo{
  font-size:58px;
  margin-bottom:12px;
}

.hero h1{
  font-size:40px;
  line-height:1.08;
  margin-bottom:10px;
  font-weight:800;
  background:linear-gradient(90deg,#ffffff,#8eb4ff);
  -webkit-background-clip:text;
  -webkit-text-fill-color:transparent;
}

.subtitle{
  color:#8ea5c3;
  font-size:15px;
  margin-bottom:16px;
}

.hero-info{
  display:inline-block;
  padding:10px 16px;
  border-radius:14px;
  background:#11151b;
  border:1px solid #2c3440;
  color:#9fb3ce;
  font-size:13px;
}

.input-box{
  display:flex;
  gap:10px;
  margin-bottom:12px;
}

input{
  flex:1;
  padding:16px;
  border:none;
  border-radius:14px;
  background:#232933;
  color:white;
  font-size:17px;
  outline:none;
  min-width:0;
}

input:focus{
  box-shadow:0 0 0 2px rgba(76,141,255,.45);
}

button{
  padding:16px 20px;
  border:none;
  border-radius:14px;
  background:#4c8dff;
  color:white;
  font-weight:bold;
  cursor:pointer;
  transition:.2s;
  white-space:nowrap;
}

button:hover{
  transform:translateY(-2px);
  opacity:.95;
}

.suggestion-box{
  display:flex;
  flex-wrap:wrap;
  gap:8px;
  margin-bottom:18px;
}

.suggestion{
  padding:9px 12px;
  border-radius:999px;
  background:#11151b;
  border:1px solid #2c3440;
  color:#b7c5d9;
  font-size:13px;
  cursor:pointer;
  transition:.2s;
}

.suggestion:hover{
  background:#232933;
  color:white;
}

.quick-title{
  color:#8ea5c3;
  font-size:13px;
  margin-bottom:8px;
}

.quick-box{
  display:flex;
  flex-wrap:wrap;
  gap:8px;
  margin-bottom:20px;
}

.section{
  background:rgba(255,255,255,.025);
  border:1px solid rgba(255,255,255,.06);
  border-radius:16px;
  padding:14px;
  margin-bottom:16px;
}

.section .quick-title{
  margin-bottom:10px;
  font-weight:bold;
  letter-spacing:.3px;
}

.quick{
  padding:9px 12px;
  border-radius:999px;
  background:#202735;
  border:1px solid #334055;
  color:#d6e2f5;
  font-size:13px;
  cursor:pointer;
  transition:.2s;
}

.card{
  background:#232933;
  border-radius:16px;
  padding:16px;
  border:1px solid #313b49;
  animation:fadeUp .25s ease;
}

.type{
  color:#8eb4ff;
  font-size:13px;
  margin-bottom:8px;
}

.korean{
  font-size:30px;
  font-weight:bold;
  margin-bottom:12px;
  line-height:1.25;
  text-shadow:0 0 18px rgba(142,180,255,.35);
}

.keyboard{
  background:#11151b;
  padding:12px;
  border-radius:12px;
  color:#74ff9c;
  word-break:break-all;
  font-size:20px;
}

.indo{
  margin-top:12px;
  padding:12px;
  border-radius:12px;
  background:#11151b;
  border:1px solid #2d3745;
  color:#b7c5d9;
  font-size:14px;
  line-height:1.5;
}

.copy{
  margin-top:12px;
  width:100%;
}

.fav{
  transition:.2s;
}

.fav:hover{
  transform:scale(1.08);
}

.result{
  display:flex;
  flex-direction:column;
  gap:15px;

  max-height:70vh;
  overflow:auto;
}

.quick:hover{
  transform:translateY(-2px);
  opacity:.95;
}

.info{
  margin-top:20px;
  color:#9aa4b2;
  font-size:13px;
  text-align:center;
}

.toast{
  position:fixed;
  bottom:20px;
  left:50%;
  transform:translateX(-50%);
  background:#11151b;
  border:1px solid #2c3440;
  color:white;
  padding:12px 18px;
  border-radius:12px;
  opacity:0;
  pointer-events:none;
  transition:.25s;
}

.toast.show{
  opacity:1;
}

@keyframes fadeUp{
  from{
    opacity:0;
    transform:translateY(10px);
  }
  to{
    opacity:1;
    transform:translateY(0);
  }
}

@media(max-width:560px){
  body{
    align-items:flex-start;
    padding:16px;
  }

  .container{
    padding:22px;
  }

  .hero h1{
    font-size:34px;
  }

  .input-box{
    flex-direction:column;
  }

  button{
    width:100%;
  }
}
</style>
</head>

<body>

<div class="container">

  <div class="hero">
    <div class="beta">BETA VERSION</div>
    <div class="logo">🇰🇷</div>
    <h1>Korean MMO Chat Assistant</h1>
    <p class="subtitle">Korean MMO Phrase Generator</p>
    <div class="hero-info">Indo → Korean → Korean Keyboard Input</div>
  </div>

  <div class="input-box" style="flex-direction:column;">
    <input
    onfocus="this.select()"
      id="input"
      placeholder="Contoh: heal dong, party yuk, ada pk"
      oninput="updateSuggestions()"
      onkeydown="if(event.key==='Enter') generateText()"
    >
    <div style="display:flex;gap:10px;width:100%;">
  <button style="flex:1;" onclick="generateText()">Search</button>

  <button
  style="
  background:#2a313d;
  flex:0.5;
  border:1px solid rgba(255,255,255,0.08);
  box-shadow:0 0 20px rgba(255,255,255,0.03);
  transition:.25s ease;
  "
  onmouseover="
    this.style.transform='translateY(-2px)';
    this.style.background='rgba(255,255,255,0.12)';
  "
  onmouseout="
    this.style.transform='translateY(0)';
    this.style.background='#2a313d';
  "
  onclick="closeKeyboard(); clearAll()"
>
  🗑️ Clear
</button>
</div>
  </div>

  <div class="suggestion-box" id="suggestions"></div>
  <div class="section">
  <div class="quick-title">⚡ Quick Chat</div>
  <div class="quick-box" id="quickBox"></div>
</div>

<div class="section">
  <div class="quick-title">📂 Categories</div>
  <div class="quick-box" id="categoryBox"></div>
</div>

<div class="section">
  <div class="quick-title">⭐ Favorites</div>
  <div class="quick-box" id="favoriteBox"></div>
</div>

<div id="resultHeader"></div>

<div class="result" id="result"></div>

  <div class="info">
    Powered by Fajar R
  </div>

</div>

<div class="toast" id="toast">Copied!</div>

const CHO=['r','R','s','e','E','f','a','q','Q','t','T','d','w','W','c','z','x','v','g'];
const JUNG=['k','o','i','O','j','p','u','P','h','hk','ho','hl','y','n','nj','np','nl','b','m','ml','l'];
const JONG=['','r','R','rt','s','sw','sg','e','f','fr','fa','fq','ft','fx','fv','fg','a','q','qt','t','T','d','w','c','z','x','v','g'];

const JAMO={
'ㄱ':'r','ㄲ':'R','ㄳ':'rt','ㄴ':'s','ㄵ':'sw','ㄶ':'sg',
'ㄷ':'e','ㄸ':'E','ㄹ':'f','ㄺ':'fr','ㄻ':'fa','ㄼ':'fq',
'ㄽ':'ft','ㄾ':'fx','ㄿ':'fv','ㅀ':'fg','ㅁ':'a','ㅂ':'q',
'ㅃ':'Q','ㅄ':'qt','ㅅ':'t','ㅆ':'T','ㅇ':'d','ㅈ':'w',
'ㅉ':'W','ㅊ':'c','ㅋ':'z','ㅌ':'x','ㅍ':'v','ㅎ':'g',
'ㅏ':'k','ㅐ':'o','ㅑ':'i','ㅒ':'O','ㅓ':'j','ㅔ':'p',
'ㅕ':'u','ㅖ':'P','ㅗ':'h','ㅘ':'hk','ㅙ':'ho','ㅚ':'hl',
'ㅛ':'y','ㅜ':'n','ㅝ':'nj','ㅞ':'np','ㅟ':'nl','ㅠ':'b',
'ㅡ':'m','ㅢ':'ml','ㅣ':'l'
};

function hangulToKeyboard(text){
  let output='';

  for(const char of text){
    const code=char.charCodeAt(0);

    if(JAMO[char]){
      output+=JAMO[char];
      continue;
    }
    
    if(code>=0xAC00 && code<=0xD7A3){
      const offset=code-0xAC00;
      const jong=offset%28;
      const jung=Math.floor((offset/28)%21);
      const cho=Math.floor(offset/588);

      output+=CHO[cho]+JUNG[jung]+JONG[jong];
      continue;
    }

    output+=char;
  }

  return output;
}

function normalizeInput(text){

  return text.toLowerCase().trim().replace(/\s+/g,' ');
}

function typoScore(a,b){

  if(Math.abs(a.length - b.length) > 2) return 99;

  let diff = 0;
  const len = Math.max(a.length,b.length);

  for(let i=0;i<len;i++){
    if(a[i] !== b[i]) diff++;
  }

  return diff;
}

function closeKeyboard(){

  const input = document.getElementById('input');

  input.blur();

  input.setAttribute('readonly', true);

  setTimeout(()=>{
    input.removeAttribute('readonly');
  },100);

}

function findTypoKey(input,keys){

  if(input.length < 4) return null;

  let bestKey = null;
  let bestScore = 99;

  keys.forEach(key=>{

    const score = typoScore(input,key);

    if(score < bestScore){
      bestScore = score;
      bestKey = key;
    }

  });

  return bestScore <= 2 ? bestKey : null;
}

const aliases = {
  "arrow":"panah",
  "arrows":"panah",
  "ammo":"panah",

  "panah dikit":"panah tinggal sedikit",
  "panah sedikit":"panah tinggal sedikit",
  "panah sisa sedikit":"panah tinggal sedikit",

  "heal pls":"heal dong",

  "pk incoming":"pk datang",

};

function findDictionary(input){

  if(aliases[input] && dictionary[aliases[input]]){
    input = aliases[input];
  }

  const keys = Object.keys(dictionary);

  if(dictionary[input]){
    return dictionary[input];
  }

  const scored = [];

  keys.forEach(key=>{

    let score = 0;

    if(key === input){
      score += 100;
    }

    else if(key.startsWith(input)){
      score += 80;
    }

    else if(key.includes(input)){
      score += 60;
    }

    else if(input.includes(key)){
      score += 45;
    }

    const inputWords = input.split(" ");
    const keyWords = key.split(" ");

    const matchCount = keyWords.filter(word =>
      inputWords.includes(word)
    ).length;

    if(matchCount > 0 && input.length >= 3){
      score += matchCount * 20;
    }

    if(score > 0){
      scored.push({
        key,
        score
      });
    }

  });

  scored.sort((a,b)=>{
    if(b.score !== a.score){
      return b.score - a.score;
    }

    return a.key.length - b.key.length;
  });

  const results = [];
  const seen = new Set();

  scored.forEach(data=>{

    dictionary[data.key].forEach(item=>{

      const id = item.korean + item.type;

      if(!seen.has(id)){
        seen.add(id);
        results.push(item);
      }

    });

  });

  if(results.length > 0){
    return results.slice(0,8);
  }

  const typoKey = findTypoKey(input, keys);

  if(typoKey){
    return dictionary[typoKey];
  }

  return null;
}

function updateSuggestions(){

  const input = normalizeInput(document.getElementById('input').value);
  const box = document.getElementById('suggestions');

  box.innerHTML = '';

  if(!input || input.length < 2) return;

  const keys = Object.keys(dictionary);

  const matches = keys

  .filter(key => {

    const lowerKey = key.toLowerCase();
    const lowerInput = input.toLowerCase();

    return (
      lowerKey.startsWith(lowerInput) ||
      lowerKey.includes(lowerInput) ||
      lowerInput.includes(lowerKey) ||
      lowerKey.split(' ').some(word => word.startsWith(lowerInput))
    );

  })

  .sort((a,b)=>{

    const lowerInput = input.toLowerCase();

    const aStart = a.toLowerCase().startsWith(lowerInput) ? 1 : 0;
    const bStart = b.toLowerCase().startsWith(lowerInput) ? 1 : 0;

    return bStart - aStart;

  })

  .slice(0,10);

  matches.forEach(key=>{

    const chip=document.createElement('div');

    chip.className='suggestion';

    chip.textContent=key;

    chip.onclick=()=>{
    
    closeKeyboard();

      document.getElementById('input').value=key;

      box.innerHTML='';

      generateText();

    };

    box.appendChild(chip);

  });

}

    '❤️ HP':['hp','darah','potion darah','heal'],
    '🔵 MANA':['mp','mana'],
    '⚡ SPEED':['speed','kecepatan'],
    '🏙️ TOWN':['kota','gudang','teleport','tp']
  };

  const box = document.getElementById('categoryBox');
  const result = document.getElementById('result');
  const resultHeader = document.getElementById('resultHeader');

  box.innerHTML = '';

  Object.keys(categories).forEach(cat=>{

    const btn = document.createElement('div');

    btn.className = 'quick';

    btn.innerText = cat;

    btn.onclick = ()=>{

      if(result.dataset.category === cat){

        result.dataset.category = '';

        result.innerHTML = '';
resultHeader.innerHTML = '';

        return;

      }

      result.dataset.category = cat;

      let found = [];

      categories[cat].forEach(word=>{

        Object.keys(dictionary).forEach(key=>{

          if(key.includes(word)){
            found.push(...dictionary[key]);
          }

        });

      });

      const unique = [];

      const seen = new Set();

      found.forEach(item=>{

        const id = item.korean + item.type;

        if(!seen.has(id)){

          seen.add(id);

          unique.push(item);

        }

      });

      resultHeader.innerHTML = `
        <div class="card" data-category-title="true">

          <div class="type">CATEGORY</div>

          <div class="korean">
            ${cat.replace(/^[^\w]+ /,'')}
          </div>

          <div class="indo">
            Klik kategori yang sama lagi untuk menutup.
          </div>

        </div>
      `;

      showResults(unique.slice(0,24));

    };

    box.appendChild(btn);

  });

}

let favorites = JSON.parse(localStorage.getItem('favorites') || '[]');

function toggleFavorite(data){

  const key = data.korean;

  const index = favorites.findIndex(v => v.korean === key);

  if(index > -1){
    favorites.splice(index,1);
  }else{
    favorites.push(data);
  }

  localStorage.setItem('favorites',JSON.stringify(favorites));

  renderFavorites();
}

function renderFavorites(){

  const box = document.getElementById('favoriteBox');

  if(!box) return;

  box.innerHTML = '';

  if(favorites.length === 0){
    box.innerHTML = `
      <div style="
        color:#7f8b99;
        font-size:13px;
      ">
        Belum ada favorite
      </div>
    `;
    return;
  }

  favorites.forEach(item=>{

    const btn = document.createElement('div');

    btn.className = 'quick';

    btn.innerText = item.korean;

    btn.onclick = ()=>{
      document.getElementById('resultHeader').innerHTML='';
document.getElementById('result').dataset.category='';
showResults([item]);
    };

    box.appendChild(btn);

  });

}

result.dataset.category='';

function showResults(items){

  const result=document.getElementById('result');
  const resultHeader=document.getElementById('resultHeader');

  if(!result.innerHTML.includes('CATEGORY')){
    result.innerHTML='';
  }

  items.forEach(item=>{

    const keyboard=hangulToKeyboard(item.korean);

    const isFav = favorites.some(fav => fav.korean === item.korean);

    const div=document.createElement('div');

    div.className='card';

    div.innerHTML=`
      <div class="type">${item.type}</div>
      <div class="korean">${item.korean}</div>
      <div class="keyboard">${keyboard}</div>
      <div class="indo">
        ${(item.indonesia || '-')
          .replace(" formal","")
          .replace(" santai","")
          .replace(" slang game","")
          .replace(" gaya English","")
        }
      </div>

      <div style="display:flex;gap:10px;margin-top:12px;">
        <button class="copy" style="flex:1;">
          Copy Keyboard
        </button>

        <button
          class="fav"
          style="
          width:58px;
          background:#2a313d;
          border:1px solid #3a4455;
          font-size:18px;
          "
        >
          ${isFav ? '⭐' : '☆'}
        </button>
      </div>
    `;

    div.querySelector('.copy').onclick=()=>{
      copyText(keyboard);
    };

    div.querySelector('.fav').onclick=(e)=>{
      toggleFavorite(item);

      const active = favorites.some(fav => fav.korean === item.korean);

      e.target.innerText = active ? '⭐' : '☆';
    };

    result.appendChild(div);

  });

  result.scrollIntoView({
    behavior:'smooth',
    block:'start'
  });

}

function copyText(text){

  if(navigator.clipboard && window.isSecureContext){

    navigator.clipboard.writeText(text).then(()=>{
      showToast();
    }).catch(()=>{
      fallbackCopy(text);
    });

  }else{
    fallbackCopy(text);
  }

}

function fallbackCopy(text){

  const textarea=document.createElement('textarea');

  textarea.value=text;
  textarea.style.position='fixed';
  textarea.style.opacity='0';

  document.body.appendChild(textarea);

  textarea.focus();
  textarea.select();

  document.execCommand('copy');

  document.body.removeChild(textarea);

  showToast();

}

function showToast(){

  const toast=document.getElementById('toast');

  toast.classList.add('show');

  setTimeout(()=>{
    toast.classList.remove('show');
  },1500);

}
